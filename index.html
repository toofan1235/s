<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Popup Example</title>
</head>
<body>
    <script>
        // Function to open the URL in a new popup window
        function openPopup() {
            const url = "https://joyful-pavlova-e7f1c6.netlify.app/";
            const popup = window.open(url, "_blank", "width=600,height=400");

            // Optional: Focus the popup window
            if (popup) {
                popup.focus();
            } else {
                alert("Popup blocked! Please allow popups for this site.");
            }
        }

        // Automatically open the popup after 3 seconds
        setTimeout(openPopup, 3000); // 3000 milliseconds = 3 seconds
    </script>
</body>
</html>
